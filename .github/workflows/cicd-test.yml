name: CICD-test

on:
  workflow_dispatch:
        inputs:
          environment:
            description: Please select the environment type
            default: "dev"
            required: true
            type: choice
            options:
                  - dev
                  - qa
                  - prod
            

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: code clone from github repo
        run: echo "clone the code from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build the code
        run: echo "build the code via docker build command"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "run the tests on build"
  deploy:
    if: inputs.environment == 'dev'
    needs: [test]
    runs-on: ubuntu-latest
    steps: 
      - name: deploy the code
        run: echo "deploy the code via docker compose"
